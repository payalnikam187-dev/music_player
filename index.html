<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Payal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Album Art -->
        <div class="album-art">
            <img id="album-image" src="https://picsum.photos/id/1015/400/400" alt="Album Art">
        </div>

        <!-- Song Info -->
        <div class="song-info">
            <h2 id="song-title">Song Title</h2>
            <p id="song-artist">Artist Name</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" max="100">
            <span id="duration">0:00</span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
            <button id="play-pause-btn"><i class="fas fa-play"></i></button>
            <button id="next-btn"><i class="fas fa-step-forward"></i></button>
        </div>

        <!-- Volume -->
        <div class="volume-container">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volume-slider" value="80" min="0" max="100">
        </div>

        <!-- Playlist -->
        <div class="playlist">
            <h3>Playlist</h3>
            <ul id="playlist"></ul>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audio-player" preload="metadata"></audio>

    <script src="script.js"></script>
</body>
</html>
